        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    </head>
    <body>
        <div id="register_form">
            <form id="register", method="post">
                <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
                <label for="email">Электронная почта</label>
                <input type="email" id="email_field" name="email" placeholder="Введите вашу электронную почту" required >
                <br>
                <label for="password">Пароль</label>
                <input type="password" id="password_field" name="password" placeholder="Введите пароль" required>
                <br>
                <label for="password">Повторите пароль</label>
                <input type="password" id="password_repeat" name="password_repeat" placeholder="Повторите пароль" required>
                <br>
                {% if error %}
                    <div class="error-message">{{ error }}</div>
                {% endif %}
                <button type="submit">Зарегистрироваться</button>
                <br>
                <div class="oauth-buttons">
                    <a href="/auth/login/yandex" class="oauth-btn oauth-yandex">
                        <img src="{{ url_for('static', filename='img/Yandex.png') }}" class="oauth-icon">
                    </a>
                    <br>
                    {% if show_google %}
                    <a href="/auth/login/google" class="oauth-btn oauth-google">
                        <img src="{{ url_for('static', filename='img/Google.png') }}" class="oauth-icon">
                    </a>
                    {% endif %}
                </div>
                <br>
                <p style="margin-top: 20px; font-size: 0.9rem;">
                    Уже есть аккаунт? <a href="/" style="color: #00c8ff; text-decoration: none;">Войти</a>
                </p>
                
            </form>
        </div>
    </body>
</html>
