<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Cosmos1562</title>
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
        <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Audiowide&family=Orbitron:wght@400..900&display=swap" rel="stylesheet">
        <link rel="stylesheet" href="static/css/register.css">
    </head>
    <body>
        <div id="register_form">
            <form id="register", method="post">
                <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
                <label for="email">Email</label>
                <input type="email" id="email_field" name="email" placeholder="Enter your email" required >
                <br>
                <label for="password">Password</label>
                <input type="password" id="password_field" name="password" placeholder="Enter your password" required>
                <br>
                <label for="password">Repeat Password</label>
                <input type="password" id="password_repeat" name="password_repeat" placeholder="Repeat your password" required>
                <br>
                {% if error %}
                    <div class="error-message">{{ error }}</div>
                {% endif %}
                <button type="submit">Register</button>
                <br>
                <div class="oauth-buttons">
                    <a href="/auth/login/yandex" class="oauth-btn oauth-yandex">
                        <img src="{{ url_for('static', filename='img/Yandex.png') }}" class="oauth-icon">
                    </a>
                    <br>
                    <a href="/auth/login/google" class="oauth-btn oauth-google">
                        <img src="{{ url_for('static', filename='img/Google.png') }}" class="oauth-icon">
                    </a>
                </div>
                <br>
                <p style="margin-top: 20px; font-size: 0.9rem;">
                    Already have an account? <a href="/" style="color: #00c8ff; text-decoration: none;">Login here</a>
                </p>
                
            </form>
        </div>
    </body>
</html>
